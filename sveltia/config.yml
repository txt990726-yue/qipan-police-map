backend:
  name: github
  repo: txt990726-yue/qipan-police-map
  branch: main

media_folder: assets/photos
public_folder: assets/photos

collections:
  - name: site
    label: 大屏页面文案
    files:
      - name: site_content
        label: 页面文案与关键数据
        file: content/site.json
        format: json
        fields:
          - name: intro
            label: 第一页简介
            widget: object
            fields:
              - { name: agency, label: 单位名称, widget: string }
              - { name: headline, label: 首页大标题, widget: string }
              - { name: eyebrow, label: 栏目小标题, widget: string }
              - { name: title, label: 简介标题, widget: string }
              - name: paragraphs
                label: 简介正文段落
                widget: list
                field: { name: paragraph, label: 段落, widget: text }
              - name: stats
                label: 关键数据
                widget: list
                summary: "{{fields.value}} {{fields.label}}"
                fields:
                  - { name: value, label: 数值, widget: string }
                  - { name: label, label: 名称, widget: string }
              - { name: nextButton, label: 按钮文字, widget: string }
          - name: area
            label: 第二页辖区图
            widget: object
            fields:
              - { name: kicker, label: 页眉小标题, widget: string }
              - { name: title, label: 大标题, widget: string }
              - { name: description, label: 说明文字, widget: text }
          - name: structure
            label: 第三页分工金字塔
            widget: object
            fields:
              - { name: kicker, label: 页眉小标题, widget: string }
              - { name: title, label: 大标题, widget: string }
              - { name: eyebrow, label: 侧栏小标题, widget: string }
              - { name: heading, label: 侧栏标题, widget: string }
              - { name: description, label: 侧栏说明, widget: text }
              - name: stats
                label: 侧栏数据
                widget: list
                summary: "{{fields.value}} {{fields.label}}"
                fields:
                  - { name: value, label: 数值, widget: string }
                  - { name: label, label: 名称, widget: string }

  - name: regions
    label: 辖区与社区负责人
    files:
      - name: region_content
        label: 辖区与社区负责人
        file: content/regions.json
        format: json
        fields:
          - name: town
            label: 镇区辖区
            widget: object
            fields:
              - { name: title, label: 页面标题, widget: string }
              - { name: subtitle, label: 提示文字, widget: string }
              - { name: image, label: 地图路径, widget: string }
              - { name: cardMeta, label: 首页卡片说明, widget: string }
              - name: regions
                label: 社区列表
                widget: list
                allow_add: false
                summary: "{{fields.name}}"
                fields:
                  - { name: id, label: 内部编号, widget: hidden }
                  - { name: name, label: 社区名称, widget: string }
                  - name: director
                    label: 负责人信息
                    widget: object
                    fields:
                      - { name: role, label: 职务, widget: string }
                      - { name: name, label: 姓名, widget: string }
                      - { name: phone, label: 电话, widget: string, required: false }
                      - { name: area, label: 负责区域, widget: text }
                      - { name: photo, label: 照片, widget: image, required: false }
          - name: rural
            label: 农牧区辖区
            widget: object
            fields:
              - { name: title, label: 页面标题, widget: string }
              - { name: subtitle, label: 提示文字, widget: string }
              - { name: image, label: 地图路径, widget: string }
              - { name: cardMeta, label: 首页卡片说明, widget: string }
              - name: regions
                label: 区域列表
                widget: list
                allow_add: false
                summary: "{{fields.name}}"
                fields:
                  - { name: id, label: 内部编号, widget: hidden }
                  - { name: name, label: 区域名称, widget: string }
                  - name: director
                    label: 负责人信息
                    widget: object
                    fields:
                      - { name: role, label: 职务, widget: string }
                      - { name: name, label: 姓名, widget: string }
                      - { name: phone, label: 电话, widget: string, required: false }
                      - { name: area, label: 负责区域, widget: text }
                      - { name: photo, label: 照片, widget: image, required: false }

  - name: personnel
    label: 组织架构人员
    files:
      - name: personnel_content
        label: 组织架构人员
        file: content/personnel.json
        format: json
        fields:
          - { name: version, label: 数据版本, widget: number, value_type: int }
          - { name: updatedAt, label: 更新时间, widget: datetime, date_format: YYYY-MM-DD, time_format: false }
          - name: organization
            label: 岗位分层
            widget: list
            allow_add: false
            summary: "{{fields.title}}"
            fields:
              - { name: id, label: 内部编号, widget: hidden }
              - { name: title, label: 层级名称, widget: string }
              - { name: subtitle, label: 层级说明, widget: string }
              - name: tone
                label: 层级颜色
                widget: select
                options: [gold, cyan, blue, orange, green]
              - name: positions
                label: 岗位人员
                widget: list
                summary: "{{fields.title}} - {{fields.name}}"
                fields:
                  - { name: id, label: 内部编号, widget: hidden }
                  - { name: title, label: 岗位, widget: string }
                  - { name: name, label: 姓名, widget: string }
                  - { name: duty, label: 职责, widget: text }
                  - { name: phone, label: 电话, widget: string, required: false }
                  - { name: photo, label: 照片, widget: image, required: false }
                  - name: members
                    label: 组员
                    widget: list
                    required: false
                    field: { name: member, label: 姓名, widget: string }
